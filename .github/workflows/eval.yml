name: eval

on:
  push:
  pull_request:

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      # The scenario suite is hermetic: no API keys, no database. The graph runs
      # on an in-memory checkpointer and the LLM-backed nodes are mocked, so the
      # eval gate is deterministic and needs no secrets.
      - name: Run evals
        run: pytest tests/ -v
